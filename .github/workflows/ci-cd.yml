name: devops-ci-cd

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  push:
    branches:
      - main

env:
  REGION: us-central1
  MY_CLUSTER: devops-gke
  REPO_NAME: devops-repo
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  USE_GKE_GCLOUD_AUTH_PLUGIN: true

jobs:

  # ─── GATE ──────────────────────────────────────────────────────────
  validate-pr-description:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "::error::PR description is required. Please add a description and try again."
            exit 1
          fi
          echo "✅ PR description found. Proceeding with pipeline."

  # ─── BUILD ─────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [validate-pr-description]
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.validate-pr-description.result == 'success'
      )
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t backend:${{ github.sha }} ./backend

      - name: Build Frontend Image
        run: docker build -t frontend:${{ github.sha }} ./frontend

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Tag and Push Backend Image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}
          docker tag backend:${{ github.sha }} $IMAGE
          docker push $IMAGE

      - name: Tag and Push Frontend Image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }}
          docker tag frontend:${{ github.sha }} $IMAGE
          docker push $IMAGE

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|frontendImage:.*|frontendImage: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }}|g" helm-chart/devops-app/values.yaml
          sed -i "s|backendImage:.*|backendImage: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }}|g" helm-chart/devops-app/values.yaml

      - name: Package Helm Chart
        run: helm package helm-chart/devops-app

      - name: Login to Helm OCI Registry
        run: |
          helm registry login ${{ env.REGION }}-docker.pkg.dev \
            -u oauth2accesstoken \
            -p "$(gcloud auth print-access-token)"

      - name: Push Helm Chart to Artifact Registry
        run: |
          helm push devops-app-0.1.0.tgz \
            oci://${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}

  # ─── TEST ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [validate-pr-description]
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.validate-pr-description.result == 'success'
      )
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: echo "Running test suite..."

  # ─── DEPLOY ────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Check if GKE Cluster Exists
        run: |
          if ! gcloud container clusters describe ${{ env.MY_CLUSTER }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} > /dev/null 2>&1; then
            echo "::error::GKE cluster '${{ env.MY_CLUSTER }}' not found. Failing pipeline."
            exit 1
          fi

      - name: Install GKE Auth Plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials ${{ env.MY_CLUSTER }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Login to Helm OCI Registry
        run: |
          helm registry login ${{ env.REGION }}-docker.pkg.dev \
            -u oauth2accesstoken \
            -p "$(gcloud auth print-access-token)"

      - name: Pull Helm Chart
        run: |
          helm pull \
            oci://${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/devops-app \
            --version 0.1.0 --untar

      - name: Deploy Helm Release
        run: helm upgrade --install devops-app ./devops-app